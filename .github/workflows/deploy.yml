name: Deploy

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run server unit tests
        run: bun --filter server test

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun --filter web test:e2e

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build server binary (Linux x64)
        run: bun --filter server build:linux-x64

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: apps/server/server
          retention-days: 1

      - name: Upload migrations
        uses: actions/upload-artifact@v4
        with:
          name: server-drizzle
          path: apps/server/drizzle/
          retention-days: 1

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate web production env
        env:
          PROD_WEB_API_URL: ${{ secrets.PROD_WEB_API_URL }}
        run: |
          if [ -z "$PROD_WEB_API_URL" ]; then
            echo "Missing PROD_WEB_API_URL. Configure it in GitHub production environment secrets."
            exit 1
          fi
          printf 'VITE_API_URL=%s\n' "$PROD_WEB_API_URL" > apps/web/.env.production

      - name: Build web
        run: bun --filter web build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    environment: production

    steps:
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./artifacts/server-binary

      - name: Download migrations
        uses: actions/download-artifact@v4
        with:
          name: server-drizzle
          path: ./artifacts/server-drizzle

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./artifacts/web

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            mkdir -p /opt/fullstack-template/server/bin
            mkdir -p /opt/fullstack-template/web
          '

      - name: Upload web assets
        run: |
          rsync -avz --no-owner --no-group --delete \
            ./artifacts/web/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/fullstack-template/web/

      - name: Upload server binary and migrations
        run: |
          chmod +x ./artifacts/server-binary/server
          scp ./artifacts/server-binary/server \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/fullstack-template/server/bin/server.new
          rsync -avz --no-owner --no-group --delete ./artifacts/server-drizzle/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/fullstack-template/server/drizzle/

      - name: Execute remote deployment
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'REMOTE_SCRIPT'
            set -euo pipefail

            APP_DIR="/opt/fullstack-template/server"
            BIN_DIR="$APP_DIR/bin"

            echo "==> [1/3] 停止旧服务..."
            # 首次部署时服务未运行，|| true 防止报错
            sudo systemctl stop fullstack-template-server || true

            echo "==> [2/3] 替换二进制文件..."
            mv "$BIN_DIR/server.new" "$BIN_DIR/server"
            chmod +x "$BIN_DIR/server"

            echo "==> [3/3] 启动服务（含数据库迁移）..."
            # 检查 service 文件是否存在（首次部署需先执行 scripts/server-setup.sh）
            if [ ! -f /etc/systemd/system/fullstack-template-server.service ]; then
              echo "ERROR: systemd service 'fullstack-template-server' 不存在，请先在本地执行 bun run setup"
              exit 1
            fi
            sudo systemctl start fullstack-template-server
            sudo systemctl status fullstack-template-server --no-pager

            echo "==> 部署完成！"
          REMOTE_SCRIPT

      - name: Health check
        env:
          PROD_WEB_API_URL: ${{ secrets.PROD_WEB_API_URL }}
        run: |
          sleep 3
          if [ -z "$PROD_WEB_API_URL" ]; then
            echo "Missing PROD_WEB_API_URL. Configure it in GitHub production environment secrets."
            exit 1
          fi
          curl -sf "$PROD_WEB_API_URL" || (echo "Health check failed: $PROD_WEB_API_URL" && exit 1)
