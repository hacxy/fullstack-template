name: Deploy

on:
  push:
    tags:
      - 'prod_*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run server unit tests
        run: bun --filter server test

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun --filter web test:e2e

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build server binary (Linux x64)
        run: bun --filter server build:linux

      - name: Package migrations
        run: tar -czf migrations.tar.gz -C apps/server/prisma migrations schema.prisma

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: |
            apps/server/dist/server
            migrations.tar.gz
          retention-days: 1

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build web
        run: bun --filter web build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    environment: production

    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./artifacts/server

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./artifacts/web

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            mkdir -p /opt/myapp/server/bin
            mkdir -p /opt/myapp/server/prisma/migrations
            mkdir -p /opt/myapp/web
          '

      - name: Upload web assets
        run: |
          rsync -avz --delete \
            ./artifacts/web/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/myapp/web/

      - name: Upload server binary
        run: |
          chmod +x ./artifacts/server/apps/server/dist/server
          scp ./artifacts/server/apps/server/dist/server \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/myapp/server/bin/server.new

      - name: Upload migrations
        run: |
          scp ./artifacts/server/migrations.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/myapp/server/

      - name: Execute remote deployment
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'REMOTE_SCRIPT'
            set -euo pipefail
            export PATH="$HOME/.bun/bin:$PATH"

            APP_DIR="/opt/myapp/server"
            BIN_DIR="$APP_DIR/bin"
            PRISMA_DIR="$APP_DIR/prisma"

            echo "==> [1/5] 解压迁移文件..."
            tar -xzf "$APP_DIR/migrations.tar.gz" -C "$PRISMA_DIR"
            rm -f "$APP_DIR/migrations.tar.gz"

            echo "==> [2/5] 运行数据库迁移..."
            if ! command -v bun &> /dev/null; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"
            fi
            # cd 到 APP_DIR，确保 schema.prisma 中 file:./prisma/sqlite.db 路径正确解析
            cd "$APP_DIR"
            bunx prisma migrate deploy --schema="$PRISMA_DIR/schema.prisma"

            echo "==> [3/5] 停止旧服务..."
            # 首次部署时服务未运行，|| true 防止报错
            sudo systemctl stop myapp-server || true

            echo "==> [4/5] 替换二进制文件..."
            mv "$BIN_DIR/server.new" "$BIN_DIR/server"
            chmod +x "$BIN_DIR/server"

            echo "==> [5/5] 启动服务..."
            # 检查 service 文件是否存在（首次部署需先执行 scripts/server-setup.sh）
            if [ ! -f /etc/systemd/system/myapp-server.service ]; then
              echo "ERROR: systemd service 'myapp-server' 不存在，请先在服务器上执行 scripts/server-setup.sh"
              exit 1
            fi
            sudo systemctl start myapp-server
            sudo systemctl status myapp-server --no-pager

            echo "==> 部署完成！"
          REMOTE_SCRIPT

      - name: Health check
        run: |
          sleep 3
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'curl -sf http://localhost:3000/ || (echo "Health check failed" && exit 1)'
